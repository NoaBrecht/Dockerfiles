version: "3.8"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always

    volumes:
      - /srv/docker/uptime-kuma/data:/app/data

    labels:
      - "traefik.enable=true"

      # Public route
      - "traefik.http.routers.kuma.rule=PathPrefix(`/kuma`)"
      - "traefik.http.routers.kuma.entrypoints=web"

      # Internal service port
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"

      # Rewrite /dashboard → /kuma/dashboard
      - "traefik.http.middlewares.kuma-rewrite.replacepathregex.regex=^/dashboard(.*)"
      - "traefik.http.middlewares.kuma-rewrite.replacepathregex.replacement=/kuma/dashboard$$1"

      # Rewrite /assets/* → /kuma/assets/*
      - "traefik.http.middlewares.kuma-rewrite2.replacepathregex.regex=^/assets/(.*)"
      - "traefik.http.middlewares.kuma-rewrite2.replacepathregex.replacement=/kuma/assets/$$1"

      # Rewrite /api/* → /kuma/api/*
      - "traefik.http.middlewares.kuma-rewrite3.replacepathregex.regex=^/api/(.*)"
      - "traefik.http.middlewares.kuma-rewrite3.replacepathregex.replacement=/kuma/api/$$1"

      # Apply all middlewares
      - "traefik.http.routers.kuma.middlewares=kuma-rewrite,kuma-rewrite2,kuma-rewrite3"

    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
