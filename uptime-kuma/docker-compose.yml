version: "3.8"

services:
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: always

    volumes:
      - /srv/docker/uptime-kuma/data:/app/data

    labels:
      - "traefik.enable=true"

      # Public route
      - "traefik.http.routers.kuma.rule=PathPrefix(`/kuma`)"
      - "traefik.http.routers.kuma.entrypoints=web"

      # Internal service port
      - "traefik.http.services.kuma.loadbalancer.server.port=3001"

      # Rewrite /kuma → / so Kuma sees its root correctly
      - "traefik.http.middlewares.kuma-rewrite.replacepathregex.regex=^/kuma(.*)"
      - "traefik.http.middlewares.kuma-rewrite.replacepathregex.replacement=/$$1"

      # Apply middleware
      - "traefik.http.routers.kuma.middlewares=kuma-rewrite"

    networks:
      - traefik-net

networks:
  traefik-net:
    external: true
